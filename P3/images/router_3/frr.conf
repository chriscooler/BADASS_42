hostname dagudelo-3
no ipv6 forwarding
!
interface eth2
 ip address 10.1.1.10/30
!
interface lo
 ip address 1.1.1.4/32
!
router bgp 1
 neighbor 1.1.1.1 remote-as 1
 neighbor 1.1.1.1 update-source lo
 !
 address-family l2vpn evpn
  neighbor 1.1.1.1 activate
  advertise-all-vni
 exit-address-family
!
router ospf
 network 0.0.0.0/0 area 0
!
